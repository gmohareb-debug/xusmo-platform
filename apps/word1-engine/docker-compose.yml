services:
  db:
    image: mariadb:11.4
    container_name: word1-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WP_DB_NAME:-wordpress}
      MYSQL_USER: ${WP_DB_USER:-wordpress}
      MYSQL_PASSWORD: ${WP_DB_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - word1_db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3311}:3306"
    networks:
      - word1

  wordpress:
    image: wordpress:php8.3-apache
    container_name: word1-wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:-wordpress}
    ports:
      - "${WP_PORT:-8092}:80"
    volumes:
      - word1_wp_data:/var/www/html
    networks:
      - word1

volumes:
  word1_db_data:
  word1_wp_data:

networks:
  word1:
